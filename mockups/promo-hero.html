<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>BSidesKC 2026 – Lunar Lander Badge Promo</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif}

  .card{position:relative;width:1200px;height:630px;background:#0a0a1a;overflow:hidden}

  /* === BACKGROUND STARS === */
  .bg-star{position:absolute;border-radius:50%;background:#fff}
  @keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}
  @keyframes twinkle2{0%,100%{opacity:.6}50%{opacity:.15}}

  /* === FLOATING PARTICLES === */
  .particle{position:absolute;width:3px;height:3px;border-radius:50%;background:#00e5ff;opacity:.4}
  @keyframes float-up{0%{transform:translateY(0) translateX(0);opacity:.4}50%{opacity:.8}100%{transform:translateY(-120px) translateX(20px);opacity:0}}
  @keyframes float-down{0%{transform:translateY(0) translateX(0);opacity:.3}50%{opacity:.7}100%{transform:translateY(100px) translateX(-15px);opacity:0}}

  /* === BADGE SCREEN === */
  .badge-wrap{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:656px;height:496px;border-radius:18px;padding:8px;background:linear-gradient(135deg,#00e5ff33,#00e5ff11);animation:glow-pulse 3s ease-in-out infinite}
  @keyframes glow-pulse{0%,100%{box-shadow:0 0 25px #00e5ff55,0 0 60px #00e5ff22}50%{box-shadow:0 0 40px #00e5ff88,0 0 90px #00e5ff44}}
  .badge-screen{position:relative;width:640px;height:480px;background:#050510;border-radius:12px;overflow:hidden}

  /* === SCANLINES === */
  .scanlines{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.15) 2px,rgba(0,0,0,.15) 4px);pointer-events:none;z-index:20}
  .scanlines::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.35) 100%);pointer-events:none}

  /* === GAME STARS === */
  .game-star{position:absolute;border-radius:50%;background:#fff}

  /* === TERRAIN === */
  .terrain-svg{position:absolute;bottom:0;left:0;width:640px;height:240px;z-index:5}

  /* === TOUCH ZONES === */
  .touch-zones{position:absolute;inset:0;z-index:15;pointer-events:none}
  .tz-v{position:absolute;left:50%;top:0;width:1px;height:100%;background:rgba(255,255,255,.06)}
  .tz-h{position:absolute;left:50%;top:50%;width:50%;height:1px;background:rgba(255,255,255,.06)}

  /* === LANDER === */
  .lander{position:absolute;z-index:10;left:340px;top:180px;width:30px;height:40px}
  .lander-body{position:absolute;top:0;left:5px;width:20px;height:16px;background:transparent;border:2px solid #fff;border-radius:3px 3px 0 0}
  .lander-base{position:absolute;top:16px;left:3px;width:24px;height:6px;background:transparent;border:2px solid #ccc;border-top:none}
  .lander-leg-l{position:absolute;top:22px;left:0;width:2px;height:10px;background:#aaa;transform:rotate(15deg);transform-origin:top center}
  .lander-leg-r{position:absolute;top:22px;right:0;width:2px;height:10px;background:#aaa;transform:rotate(-15deg);transform-origin:top center}
  .lander-foot-l{position:absolute;top:31px;left:-3px;width:8px;height:2px;background:#aaa;border-radius:1px}
  .lander-foot-r{position:absolute;top:31px;right:-3px;width:8px;height:2px;background:#aaa;border-radius:1px}
  .lander-antenna{position:absolute;top:-8px;left:13px;width:2px;height:9px;background:#888}
  .lander-antenna-tip{position:absolute;top:-11px;left:11px;width:6px;height:4px;border-radius:50%;border:1px solid #aaa}

  /* === THRUST FLAME === */
  .thrust{position:absolute;top:34px;left:8px;z-index:9;animation:flame-flicker .1s infinite alternate}
  .thrust-inner{width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-top:18px solid #ff8c00;filter:blur(1px)}
  .thrust-core{position:absolute;top:0;left:3px;width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:12px solid #ffcc00}
  @keyframes flame-flicker{0%{transform:scaleY(1) scaleX(1)}100%{transform:scaleY(1.15) scaleX(.9)}}

  /* === HUD === */
  .hud{position:absolute;z-index:18;font-family:'Courier New',monospace;font-size:14px}
  .hud-fuel{top:12px;left:12px;color:#ccc}
  .fuel-bar-bg{display:inline-block;width:80px;height:10px;background:#333;border-radius:2px;vertical-align:middle;margin-left:4px}
  .fuel-bar{width:72%;height:100%;background:#00c853;border-radius:2px}
  .hud-speed{top:12px;right:12px;color:#ff4444;text-align:right;font-weight:bold}
  .hud-alt{top:32px;right:12px;color:#ccc;text-align:right}

  /* === TOO FAST WARNING === */
  .warning{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);z-index:18;font-family:'Courier New',monospace;font-size:20px;font-weight:bold;color:#ff4444;text-shadow:0 0 10px #ff444488;animation:blink-warn .5s step-end infinite}
  @keyframes blink-warn{0%,100%{opacity:1}50%{opacity:0}}

  /* === PROMO TEXT === */
  .title{position:absolute;top:18px;left:50%;transform:translateX(-50%);font-size:42px;font-weight:800;color:#00e5ff;text-shadow:0 0 30px #00e5ff88,0 0 60px #00e5ff44;letter-spacing:4px;white-space:nowrap;z-index:2}
  .subtitle-left{position:absolute;bottom:22px;left:40px;font-size:26px;font-weight:800;color:#fff;letter-spacing:2px;z-index:2}
  .subtitle-right{position:absolute;bottom:28px;right:40px;font-size:13px;color:#888;letter-spacing:1.5px;z-index:2}
  .date{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-size:12px;color:#666;letter-spacing:2px;z-index:2}
</style>
</head>
<body>
<div class="card" id="card">
  <!-- BG stars injected by JS -->

  <!-- Floating particles -->
  <div class="particle" style="left:60px;top:200px;animation:float-up 4s infinite"></div>
  <div class="particle" style="left:1120px;top:350px;animation:float-down 5s 1s infinite"></div>
  <div class="particle" style="left:150px;top:500px;animation:float-up 6s 2s infinite"></div>
  <div class="particle" style="right:180px;top:100px;animation:float-down 4.5s .5s infinite"></div>
  <div class="particle" style="left:80px;top:80px;animation:float-up 5.5s 1.5s infinite;background:#ff8c00"></div>
  <div class="particle" style="right:90px;bottom:120px;animation:float-up 3.5s .8s infinite"></div>

  <!-- Title -->
  <div class="title">BSidesKC 2026</div>

  <!-- Badge screen -->
  <div class="badge-wrap">
    <div class="badge-screen">
      <!-- Game stars injected by JS -->

      <!-- Terrain -->
      <svg class="terrain-svg" viewBox="0 0 640 240" preserveAspectRatio="none">
        <polygon points="0,180 30,160 55,120 80,140 110,90 135,110 160,70 185,100 210,85 240,130 270,150 300,160 330,165 370,165 400,160 420,130 450,80 475,110 500,60 525,95 550,70 575,105 600,85 625,110 640,130 640,240 0,240" fill="#142814" stroke="#00c800" stroke-width="2"/>
        <!-- Landing zone highlight -->
        <line x1="300" y1="160" x2="370" y2="165" stroke="#ffff00" stroke-width="3"/>
        <text x="335" y="155" text-anchor="middle" fill="#ffff00" font-size="9" font-family="Courier New" opacity=".7">▼</text>
      </svg>

      <!-- Touch zone dividers -->
      <div class="touch-zones">
        <div class="tz-v"></div>
        <div class="tz-h"></div>
      </div>

      <!-- Lander -->
      <div class="lander">
        <div class="lander-antenna"></div>
        <div class="lander-antenna-tip"></div>
        <div class="lander-body"></div>
        <div class="lander-base"></div>
        <div class="lander-leg-l"></div>
        <div class="lander-leg-r"></div>
        <div class="lander-foot-l"></div>
        <div class="lander-foot-r"></div>
        <div class="thrust">
          <div class="thrust-inner"></div>
          <div class="thrust-core"></div>
        </div>
      </div>

      <!-- HUD -->
      <div class="hud hud-fuel">Fuel: 72% <span class="fuel-bar-bg"><span class="fuel-bar"></span></span></div>
      <div class="hud hud-speed">Spd: 3.2 ↓</div>
      <div class="hud hud-alt">Alt: 145</div>

      <!-- Warning -->
      <div class="warning">! TOO FAST !</div>

      <!-- Scanlines -->
      <div class="scanlines"></div>
    </div>
  </div>

  <!-- Bottom promo text -->
  <div class="subtitle-left">🚀 LUNAR LANDER</div>
  <div class="subtitle-right">MULTIPLAYER • LEADERBOARDS • BOT API</div>
  <div class="date">April 25 · Kansas City</div>
</div>

<script>
// Background stars
const card = document.getElementById('card');
for(let i=0;i<80;i++){
  const s=document.createElement('div');
  s.className='bg-star';
  const sz=Math.random()*2+1;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*1200}px;top:${Math.random()*630}px;opacity:${Math.random()*.5+.1};animation:${Math.random()>.5?'twinkle':'twinkle2'} ${2+Math.random()*4}s ${Math.random()*3}s infinite`;
  card.appendChild(s);
}
// Game screen stars
const screen=document.querySelector('.badge-screen');
for(let i=0;i<40;i++){
  const s=document.createElement('div');
  s.className='game-star';
  const sz=Math.random()*1.5+.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*640}px;top:${Math.random()*280}px;opacity:${Math.random()*.6+.1};animation:twinkle ${2+Math.random()*3}s ${Math.random()*2}s infinite`;
  screen.appendChild(s);
}
</script>
</body>
</html>
